name: labelhub

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-labelhub123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-labelhub}
      MYSQL_USER: ${MYSQL_USER:-labelhub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-labelhub123}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-labelhub123}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-labelhub}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-labelhub123}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-labelhub}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-labelhub123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-labelhub}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-labelhub123}
    entrypoint: /bin/sh
    command: /minio-init.sh
    volumes:
      - ./deploy/minio-init.sh:/minio-init.sh:ro
    restart: "no"

  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-labelhub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-labelhub123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-labelhub}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-labelhub}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-labelhub123}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-labelhub}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-labelhub123}
      MINIO_SECURE: "false"
      LABELHUB_MINIO_PUBLIC_URL: ${LABELHUB_MINIO_PUBLIC_URL:-http://localhost:9000}
      JWT_SECRET: ${JWT_SECRET:-buyunaihe-dev-secret-change-me}
      AGENT_WEB_URL: http://agent-web:5001
    ports:
      - "8080:8080"

  agent-web:
    build:
      context: ./Agent
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-labelhub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-labelhub123}
      MYSQL_DATABASE: labelhub_agent
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-labelhub}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-labelhub123}
      AI_AUDIT_BASE_URL: ${AI_AUDIT_BASE_URL:-}
      AI_AUDIT_API_KEY: ${AI_AUDIT_API_KEY:-}
      AI_AUDIT_MODEL: ${AI_AUDIT_MODEL:-gpt-4o-mini}
    ports:
      - "5001:5001"

  agent-worker:
    build:
      context: ./Agent
    restart: unless-stopped
    command: ["python", "run_audit_worker.py"]
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-labelhub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-labelhub123}
      MYSQL_DATABASE: labelhub_agent
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-labelhub}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-labelhub123}
      AI_AUDIT_BASE_URL: ${AI_AUDIT_BASE_URL:-}
      AI_AUDIT_API_KEY: ${AI_AUDIT_API_KEY:-}
      AI_AUDIT_MODEL: ${AI_AUDIT_MODEL:-gpt-4o-mini}

  agent-migrate:
    build:
      context: ./Agent
    profiles: ["migrate"]
    command: ["python", "-m", "annotation_agent.migrate"]
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-labelhub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-labelhub123}
      MYSQL_DATABASE: labelhub_agent
    restart: "no"

  frontend:
    build:
      context: ./Frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-8088}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  minio_data:
