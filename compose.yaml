services:
  postgres:
    image: docker.1ms.run/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?must set in deploy/docker.env}
      POSTGRES_DB: ${PG_DATABASE:-labelhub}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${PG_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: docker.1ms.run/library/redis:7-alpine
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: docker.1ms.run/library/rabbitmq:3-management
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-labelhub}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?must set in deploy/docker.env}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: docker.1ms.run/minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-labelhub}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?must set in deploy/docker.env}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: docker.1ms.run/minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-labelhub}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?must set in deploy/docker.env}
    entrypoint: /bin/sh
    command: /minio-init.sh
    volumes:
      - ./deploy/minio-init.sh:/minio-init.sh:ro
    restart: "no"

  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      PG_HOST: postgres
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:?must set in deploy/docker.env}
      PG_DATABASE: ${PG_DATABASE:-labelhub}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-labelhub}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?must set in deploy/docker.env}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-labelhub}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?must set in deploy/docker.env}
      MINIO_SECURE: "false"
      LABELHUB_MINIO_PUBLIC_URL: ${LABELHUB_MINIO_PUBLIC_URL:-http://localhost:8081/minio}
      JWT_SECRET: ${JWT_SECRET:?must set in deploy/docker.env}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-}
      AGENT_WEB_URL: http://agent-web:5001

  agent-web:
    build:
      context: ./Agent
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      TZ: Asia/Shanghai
      PG_HOST: postgres
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:?must set in deploy/docker.env}
      PG_DATABASE: ${PG_DATABASE_AGENT:-labelhub_agent}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-labelhub}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?must set in deploy/docker.env}
      AI_AUDIT_BASE_URL: ${AI_AUDIT_BASE_URL:-}
      AI_AUDIT_API_KEY: ${AI_AUDIT_API_KEY:-}
      AI_AUDIT_MODEL: ${AI_AUDIT_MODEL:-gpt-4o-mini}

  agent-worker:
    build:
      context: ./Agent
    restart: unless-stopped
    profiles: ["worker"]
    command: ["python", "run_audit_worker.py"]
    depends_on:
      - agent-web
    environment:
      TZ: Asia/Shanghai
      PG_HOST: postgres
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:?must set in deploy/docker.env}
      PG_DATABASE: ${PG_DATABASE_AGENT:-labelhub_agent}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-labelhub}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?must set in deploy/docker.env}
      AI_AUDIT_BASE_URL: ${AI_AUDIT_BASE_URL:-}
      AI_AUDIT_API_KEY: ${AI_AUDIT_API_KEY:-}
      AI_AUDIT_MODEL: ${AI_AUDIT_MODEL:-gpt-4o-mini}

  agent-migrate:
    build:
      context: ./Agent
    profiles: ["migrate"]
    command: ["python", "-m", "annotation_agent.migrate"]
    environment:
      TZ: Asia/Shanghai
      PG_HOST: postgres
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:?must set in deploy/docker.env}
      PG_DATABASE: ${PG_DATABASE_AGENT:-labelhub_agent}
    restart: "no"

  frontend:
    build:
      context: ./Frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${FRONTEND_HOST_PORT:-8081}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
  redis_data:
  rabbitmq_data:
  minio_data:
